name: Agri-Market CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup Node.js Environment
      uses: actions/setup-node@v3
      with:
        node-version: 18
        cache: 'npm'

    # Verify Frontend Build
    - name: Install Frontend Dependencies
      run: npm ci

    - name: Build Frontend Application
      run: npm run build

    # Verify Backend Build
    - name: Install Backend Dependencies
      run: |
        cd server
        npm ci

    - name: Verify Backend Syntax & Run Test Suite
      run: |
        cd server
        # runs API tests if registered in package.json, else verifies compilation
        node -c index.js

    # Verify Docker Build Verification
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Verify Frontend Docker Build
      uses: docker/build-push-action@v4
      with:
        context: .
        push: false

    - name: Verify Backend Docker Build
      uses: docker/build-push-action@v4
      with:
        context: ./server
        push: false
